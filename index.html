<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Projektleitung</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', Arial, sans-serif; background: #f0f0ed; min-height: 100vh; color: #1a1917; }
  .page { padding: 20px 14px; }
  @media(min-width: 640px) { .page { padding: 32px 24px; max-width: 860px; margin: 0 auto; } }
  .checklist-grid { grid-template-columns: 1fr; }
  @media(min-width: 640px) { .checklist-grid { grid-template-columns: 1fr 1fr; } }
  .input-row { flex-direction: column; }
  @media(min-width: 640px) { .input-row { flex-direction: row; } }
  input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
  * { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const ORDER = ["vorbereitungen","ausmass","ausfuehrungsplanung","materialauszug"];
const SECTION_LABELS = {
  vorbereitungen: "Vorbereitungen",
  ausmass: "Ausmass",
  ausfuehrungsplanung: "Ausführungsplanung",
  materialauszug: "Materialauszug"
};

const STATUS = {
  vorbereitung: { label: "Vorbereitung",            bg: "#f1f5f9", color: "#475569", border: "#cbd5e1" },
  ausmass:      { label: "Ausmass Phase",            bg: "#eff6ff", color: "#2563eb", border: "#bfdbfe" },
  planung:      { label: "Ausführungsplanung",       bg: "#fff7ed", color: "#c2410c", border: "#fed7aa" },
  material:     { label: "Materialauszug Phase",     bg: "#faf5ff", color: "#7c3aed", border: "#e9d5ff" },
  bereit:       { label: "Bereit zur Ausführung",    bg: "#f0fdf4", color: "#15803d", border: "#bbf7d0" },
};

const LEFT_BORDER = {
  vorbereitung: "#ef4444",
  ausmass:      "#3b82f6",
  planung:      "#f97316",
  material:     "#a855f7",
  bereit:       "#22c55e",
};

const PROGRESS_COLOR = (pr) => {
  if (pr === 100) return "#22c55e";
  if (pr > 60)   return "#f97316";
  return "#ef4444";
};

function getKW(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const w1 = new Date(jan4);
  w1.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
  return Math.floor((d - w1) / (7 * 864e5)) + 1;
}

function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  return `${String(d.getDate()).padStart(2,"0")}.${String(d.getMonth()+1).padStart(2,"0")}.${d.getFullYear()}`;
}

function createProject(name, date) {
  return {
    id: Math.random().toString(36).slice(2),
    name, date, open: false,
    checklist: {
      vorbereitungen: [
        { name: "Wände bis Platten fertig", done: false },
        { name: "Hauptlüftung montiert", done: false },
        { name: "Boden fertig", done: false },
        { name: "Elektrotrassen montiert", done: false },
        { name: "Termin 4-5 Wochen bestätigt", done: false },
      ],
      ausmass: [{ name: "Ausmass durchgeführt", done: false }],
      ausfuehrungsplanung: [
        { name: "Ausführungsplanung erstellt", done: false },
        { name: "GZA erhalten (Freigabe)", done: false },
      ],
      materialauszug: [{ name: "Materialauszug erstellt", done: false }],
    }
  };
}

function getProgress(p) {
  let t = 0, d = 0;
  Object.values(p.checklist).forEach(s => s.forEach(i => { t++; if (i.done) d++; }));
  return Math.round(d / t * 100);
}

function getStatusKey(p) {
  const pr = getProgress(p);
  if (pr === 100) return "bereit";
  if (pr > 75)   return "material";
  if (pr > 50)   return "planung";
  if (pr > 25)   return "ausmass";
  return "vorbereitung";
}

function getWarning(p) {
  const diff = (new Date(p.date) - new Date()) / 864e5;
  const sk = getStatusKey(p);
  if (diff <= 28 && diff > 14) {
    if (sk === "vorbereitung") return "Zeit fürs Ausmass";
    if (sk === "ausmass")      return "Ausmass erledigen";
    if (sk === "planung")      return "Planung abschliessen";
  }
  if (diff <= 14 && sk !== "bereit") return "Kritische Phase!";
  return "";
}

/* ── BADGE ── */
function Badge({ bg, color, border, children }) {
  return (
    <span style={{
      fontSize: 11, fontWeight: 600, padding: "3px 9px",
      borderRadius: 99, whiteSpace: "nowrap",
      background: bg, color, border: `1px solid ${border}`,
      fontFamily: "monospace", letterSpacing: 0.2,
    }}>{children}</span>
  );
}

/* ── CHECK ITEM ── */
function CheckItem({ item, locked, onToggle }) {
  return (
    <div
      onClick={locked ? undefined : onToggle}
      title={locked ? "Vorherige Phase zuerst abschliessen" : ""}
      style={{
        display: "flex", alignItems: "center", gap: 10,
        padding: "9px 0", fontSize: 14,
        color: item.done ? "#9ca3af" : locked ? "#d1d5db" : "#1a1917",
        textDecoration: item.done ? "line-through" : "none",
        cursor: locked ? "not-allowed" : "pointer",
        borderBottom: "1px solid #f3f4f6",
      }}
    >
      <div style={{
        width: 20, height: 20, borderRadius: 5, flexShrink: 0,
        border: `1.5px solid ${item.done ? "#22c55e" : locked ? "#e5e7eb" : "#d1d5db"}`,
        background: item.done ? "#22c55e" : locked ? "#f9fafb" : "white",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 11, color: "white", fontWeight: 800,
      }}>
        {item.done ? "✓" : locked ? "🔒" : ""}
      </div>
      <span style={{ flex: 1, lineHeight: 1.4 }}>{item.name}</span>
    </div>
  );
}

/* ── PROJECT CARD ── */
function ProjectCard({ p, onToggle, onDelete, onDateChange, onItemToggle }) {
  const pr = getProgress(p);
  const sk = getStatusKey(p);
  const st = STATUS[sk];
  const warn = getWarning(p);
  const kw = getKW(p.date);
  const total = Object.values(p.checklist).flat().length;
  const done  = Object.values(p.checklist).flat().filter(i => i.done).length;

  return (
    <div style={{
      background: "#ffffff",
      border: "1px solid #e5e7eb",
      borderLeft: `5px solid ${LEFT_BORDER[sk]}`,
      borderRadius: 12,
      marginBottom: 12,
      overflow: "hidden",
      boxShadow: "0 1px 4px rgba(0,0,0,0.06)",
    }}>
      {/* HEADER */}
      <div
        style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "14px 16px", cursor: "pointer", gap: 12 }}
        onClick={onToggle}
      >
        {/* LEFT */}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 15, fontWeight: 700, letterSpacing: -0.2, marginBottom: 6 }}>{p.name}</div>
          {/* DATE ROW */}
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }} onClick={e => e.stopPropagation()}>
            <span style={{ fontSize: 13 }}>📅</span>
            {kw && (
              <span style={{ fontSize: 11, fontFamily: "monospace", background: "#1a1917", color: "white", padding: "2px 7px", borderRadius: 99, fontWeight: 700 }}>
                KW {kw}
              </span>
            )}
            <input
              type="date"
              value={p.date ? p.date.slice(0, 10) : ""}
              onChange={e => onDateChange(e.target.value)}
              style={{ border: "1px solid #e5e7eb", borderRadius: 6, padding: "3px 7px", fontSize: 12, background: "#f9fafb", color: "#6b7280", outline: "none", cursor: "pointer" }}
            />
          </div>
        </div>

        {/* RIGHT — stacked */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 5, flexShrink: 0 }}>
          {warn && <Badge bg="#fef2f2" color="#dc2626" border="#fecaca">{warn}</Badge>}
          <Badge bg={st.bg} color={st.color} border={st.border}>{st.label}</Badge>
          <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 2 }}>
            <button
              onClick={e => { e.stopPropagation(); onDelete(); }}
              style={{ background: "transparent", border: "none", cursor: "pointer", fontSize: 15, color: "#9ca3af", padding: "2px 5px", borderRadius: 5, lineHeight: 1 }}
              title="Löschen"
            >✕</button>
            <span style={{ fontSize: 13, color: "#9ca3af", transform: p.open ? "rotate(180deg)" : "rotate(0deg)", display: "inline-block", transition: "transform 0.2s" }}>▾</span>
          </div>
        </div>
      </div>

      {/* PROGRESS */}
      <div style={{ padding: "0 16px 14px" }}>
        <div style={{ height: 6, background: "#f3f4f6", borderRadius: 99, overflow: "hidden", marginBottom: 5 }}>
          <div style={{ width: pr + "%", height: "100%", background: PROGRESS_COLOR(pr), borderRadius: 99, transition: "width 0.4s ease" }} />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#9ca3af", fontFamily: "monospace" }}>
          <span>{pr}% abgeschlossen</span>
          <span>{done} / {total} Punkte</span>
        </div>
      </div>

      {/* CHECKLIST */}
      {p.open && (
        <>
          <div style={{ height: 1, background: "#f3f4f6", margin: "0 16px" }} />
          <div className="checklist-grid" style={{ padding: "14px 16px", display: "grid", gap: 16 }}>
            {ORDER.map((section, idx) => {
              const prevDone = ORDER.slice(0, idx).every(s => p.checklist[s].every(x => x.done));
              const locked = idx > 0 && !prevDone;
              return (
                <div key={section}>
                  <div style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: "#9ca3af", marginBottom: 6, fontFamily: "monospace" }}>
                    {SECTION_LABELS[section]}
                  </div>
                  {p.checklist[section].map((item, i) => (
                    <CheckItem key={i} item={item} locked={locked} onToggle={() => onItemToggle(section, i)} />
                  ))}
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

/* ── APP ── */
function App() {
  const [projects, setProjects] = React.useState([]);
  const [name, setName]         = React.useState("");
  const [date, setDate]         = React.useState("");
  const [search, setSearch]     = React.useState("");
  const [confirmId, setConfirmId]     = React.useState(null);
  const [confirmName, setConfirmName] = React.useState("");

  React.useEffect(() => {
    try {
      const s = localStorage.getItem("projekte_v3");
      if (s) setProjects(JSON.parse(s).map(p => ({ ...p, date: p.date.slice(0, 10), open: false })));
    } catch(e) {}
  }, []);

  React.useEffect(() => {
    localStorage.setItem("projekte_v3", JSON.stringify(projects));
  }, [projects]);

  const add = () => {
    if (!name || !date) return;
    setProjects(p => [...p, createProject(name, date)]);
    setName(""); setDate("");
  };

  const askDelete = (id, n) => { setConfirmId(id); setConfirmName(n); };
  const doDelete  = () => { setProjects(p => p.filter(x => x.id !== confirmId)); setConfirmId(null); };

  const toggleOpen = id => setProjects(p => p.map(x => x.id === id ? { ...x, open: !x.open } : x));
  const updateDate = (id, d) => setProjects(p => p.map(x => x.id === id ? { ...x, date: d } : x));

  const toggleItem = (id, section, index) => {
    setProjects(prev => prev.map(p => {
      if (p.id !== id) return p;
      const idx = ORDER.indexOf(section);
      for (let i = 0; i < idx; i++) if (!p.checklist[ORDER[i]].every(x => x.done)) return p;
      const u = { ...p, checklist: { ...p.checklist } };
      u.checklist[section] = u.checklist[section].map((item, i) => i === index ? { ...item, done: !item.done } : item);
      return u;
    }));
  };

  const sorted = [...projects]
    .sort((a, b) => new Date(a.date) - new Date(b.date))
    .filter(p => p.name.toLowerCase().includes(search.toLowerCase()));

  const kw = getKW(date);

  return (
    <div className="page">

      {/* TITLE */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
        <div>
          <h1 style={{ fontSize: 24, fontWeight: 800, letterSpacing: -0.5, lineHeight: 1 }}>Projektleitung</h1>
          <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 3, fontFamily: "monospace" }}>{projects.length} Projekte</div>
        </div>
      </div>

      {/* ADD PROJECT */}
      <div style={{ background: "white", border: "1px solid #e5e7eb", borderRadius: 12, padding: 14, marginBottom: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, fontFamily: "monospace" }}>Neues Projekt</div>
        <div className="input-row" style={{ display: "flex", gap: 8 }}>
          <input
            type="text" placeholder="Projektname"
            value={name} onChange={e => setName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && add()}
            style={{ flex: 1, border: "1.5px solid #e5e7eb", borderRadius: 8, padding: "10px 12px", fontSize: 14, background: "#f9fafb", outline: "none", color: "#1a1917" }}
          />
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <input
              type="date" value={date} onChange={e => setDate(e.target.value)}
              style={{ border: "1.5px solid #e5e7eb", borderRadius: 8, padding: "10px 10px", fontSize: 14, background: "#f9fafb", outline: "none" }}
            />
            {date && (
              <div style={{ display: "flex", gap: 5, paddingLeft: 2 }}>
                <span style={{ fontSize: 11, fontFamily: "monospace", color: "#9ca3af" }}>{formatDate(date)}</span>
                <span style={{ fontSize: 11, fontFamily: "monospace", background: "#1a1917", color: "white", padding: "1px 7px", borderRadius: 99, fontWeight: 700 }}>KW {kw}</span>
              </div>
            )}
          </div>
          <button
            onClick={add}
            style={{ background: "#1a1917", color: "white", border: "none", borderRadius: 8, padding: "10px 16px", fontSize: 14, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}
          >
            + Hinzufügen
          </button>
        </div>
      </div>

      {/* SEARCH */}
      <div style={{ position: "relative", marginBottom: 20 }}>
        <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 15, color: "#9ca3af" }}>🔍</span>
        <input
          type="text" placeholder="Projekt suchen..."
          value={search} onChange={e => setSearch(e.target.value)}
          style={{ width: "100%", border: "1.5px solid #e5e7eb", borderRadius: 8, padding: "10px 36px", fontSize: 14, background: "white", outline: "none", color: "#1a1917" }}
        />
        {search && (
          <button onClick={() => setSearch("")} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "transparent", border: "none", cursor: "pointer", fontSize: 16, color: "#9ca3af" }}>✕</button>
        )}
      </div>

      {/* EMPTY STATES */}
      {projects.length === 0 && (
        <div style={{ textAlign: "center", padding: "60px 20px", color: "#9ca3af" }}>
          <div style={{ fontSize: 44, marginBottom: 12 }}>📋</div>
          <div style={{ fontWeight: 600, fontSize: 15 }}>Noch keine Projekte</div>
          <div style={{ fontSize: 13, marginTop: 4 }}>Füge dein erstes Projekt oben hinzu</div>
        </div>
      )}
      {projects.length > 0 && sorted.length === 0 && (
        <div style={{ textAlign: "center", padding: "60px 20px", color: "#9ca3af" }}>
          <div style={{ fontSize: 44, marginBottom: 12 }}>🔍</div>
          <div style={{ fontWeight: 600, fontSize: 15 }}>Kein Projekt gefunden</div>
        </div>
      )}

      {/* PROJECT CARDS */}
      {sorted.map(p => (
        <ProjectCard
          key={p.id} p={p}
          onToggle={() => toggleOpen(p.id)}
          onDelete={() => askDelete(p.id, p.name)}
          onDateChange={d => updateDate(p.id, d)}
          onItemToggle={(s, i) => toggleItem(p.id, s, i)}
        />
      ))}

      {/* DELETE CONFIRM MODAL */}
      {confirmId && (
        <div
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20 }}
          onClick={() => setConfirmId(null)}
        >
          <div
            style={{ background: "white", borderRadius: 14, padding: 28, maxWidth: 360, width: "100%", boxShadow: "0 20px 60px rgba(0,0,0,0.2)" }}
            onClick={e => e.stopPropagation()}
          >
            <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 10 }}>Projekt löschen?</div>
            <div style={{ fontSize: 14, color: "#6b7280", marginBottom: 24, lineHeight: 1.6 }}>
              Möchtest du <strong>„{confirmName}"</strong> wirklich löschen? Dies kann nicht rückgängig gemacht werden.
            </div>
            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
              <button onClick={() => setConfirmId(null)} style={{ padding: "9px 18px", borderRadius: 8, border: "1.5px solid #e5e7eb", background: "#f9fafb", fontSize: 14, cursor: "pointer", fontWeight: 600 }}>Abbrechen</button>
              <button onClick={doDelete} style={{ padding: "9px 18px", borderRadius: 8, border: "none", background: "#dc2626", color: "white", fontSize: 14, cursor: "pointer", fontWeight: 700 }}>Löschen</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
