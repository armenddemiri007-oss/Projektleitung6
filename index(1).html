<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Projektleitung</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f4f0;min-height:100vh;color:#1a1917}

/* MOBILE */
.page{padding:16px 12px}
.title{font-size:22px}
.input-bar{flex-direction:column}
.input-bar input[type="text"]{width:100%}
.input-bar input[type="date"]{width:100%}
.input-bar button{width:100%;padding:12px}
.checklist-grid{grid-template-columns:1fr}
.card-right{flex-wrap:wrap;justify-content:flex-end}

/* DESKTOP */
@media(min-width:600px){
  .page{padding:28px 20px;max-width:900px;margin:0 auto}
  .title{font-size:26px}
  .input-bar{flex-direction:row}
  .input-bar input[type="text"]{flex:1}
  .input-bar input[type="date"]{width:auto}
  .input-bar button{width:auto;padding:8px 16px}
  .checklist-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const ORDER = ["vorbereitungen","ausmass","ausfuehrungsplanung","materialauszug"];
const LABELS = {vorbereitungen:"Vorbereitungen",ausmass:"Ausmass",ausfuehrungsplanung:"Ausfuehrungsplanung",materialauszug:"Materialauszug"};
const STATUS_STYLES = {
  vorbereitung:{background:"#f1f5f9",color:"#475569"},
  ausmass:{background:"#eff6ff",color:"#2563eb"},
  planung:{background:"#ffedd5",color:"#ea580c"},
  material:{background:"#faf5ff",color:"#7c3aed"},
  bereit:{background:"#dcfce7",color:"#16a34a"}
};

function createProject(name,date){
  return {id:Math.random().toString(36).slice(2),name,date,open:false,checklist:{
    vorbereitungen:[
      {name:"Waende bis Platten fertig",done:false},
      {name:"Hauptlueftung montiert",done:false},
      {name:"Boden fertig",done:false},
      {name:"Elektrotrassen montiert",done:false},
      {name:"Termin 4-5 Wochen bestaetigt",done:false}
    ],
    ausmass:[{name:"Ausmass durchgefuehrt",done:false}],
    ausfuehrungsplanung:[
      {name:"Ausfuehrungsplanung erstellt",done:false},
      {name:"GZA erhalten (Freigabe)",done:false}
    ],
    materialauszug:[{name:"Materialauszug erstellt",done:false}]
  }};
}

function getProgress(p){let t=0,d=0;Object.values(p.checklist).forEach(s=>s.forEach(i=>{t++;if(i.done)d++;}));return Math.round(d/t*100);}

function getStatus(p){
  const pr=getProgress(p);
  if(pr===100)return{label:"Bereit zur Ausfuehrung",cls:"bereit"};
  if(pr>75)return{label:"Materialauszug Phase",cls:"material"};
  if(pr>50)return{label:"Ausfuehrungsplanung",cls:"planung"};
  if(pr>25)return{label:"Ausmass Phase",cls:"ausmass"};
  return{label:"Vorbereitung",cls:"vorbereitung"};
}

function getWarning(p){
  const diff=(new Date(p.date)-new Date())/(1000*60*60*24);
  const {label}=getStatus(p);
  if(diff<=28&&diff>14){
    if(label==="Vorbereitung")return"Zeit fuers Ausmass";
    if(label.includes("Ausmass"))return"Ausmass erledigen";
    if(label.includes("Planung"))return"Planung abschliessen";
  }
  if(diff<=14&&label!=="Bereit zur Ausfuehrung")return"Kritische Phase!";
  return"";
}

function getColor(pr){if(pr===100)return"#16a34a";if(pr>60)return"#ea580c";return"#dc2626";}

function App(){
  const [projects,setProjects]=React.useState([]);
  const [name,setName]=React.useState("");
  const [date,setDate]=React.useState("");

  React.useEffect(()=>{
    try{const s=localStorage.getItem("projekte_v3");if(s){const p=JSON.parse(s);setProjects(p.map(x=>({...x,date:x.date.slice(0,10)})));}}catch(e){}
  },[]);

  React.useEffect(()=>{localStorage.setItem("projekte_v3",JSON.stringify(projects));},[projects]);

  function addProject(){if(!name||!date)return;setProjects(p=>[...p,createProject(name,date)]);setName("");setDate("");}
  function deleteProject(id){setProjects(p=>p.filter(x=>x.id!==id));}
  function toggleOpen(id){setProjects(p=>p.map(x=>x.id===id?{...x,open:!x.open}:x));}
  function updateDate(id,d){setProjects(p=>p.map(x=>x.id===id?{...x,date:d}:x));}
  function toggleItem(id,section,index){
    setProjects(prev=>prev.map(p=>{
      if(p.id!==id)return p;
      const idx=ORDER.indexOf(section);
      for(let i=0;i<idx;i++){if(!p.checklist[ORDER[i]].every(x=>x.done))return p;}
      const u={...p,checklist:{...p.checklist}};
      u.checklist[section]=u.checklist[section].map((item,i)=>i===index?{...item,done:!item.done}:item);
      return u;
    }));
  }

  const sorted=[...projects].sort((a,b)=>new Date(a.date)-new Date(b.date));

  return(
    <div className="page">
      <h1 className="title" style={{fontWeight:800,marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
        Projektleitung
        <span style={{fontSize:11,fontWeight:600,background:"#1a1917",color:"white",padding:"2px 8px",borderRadius:99,fontFamily:"monospace"}}>{projects.length} Projekte</span>
      </h1>

      <div className="input-bar" style={{display:"flex",gap:8,marginBottom:24,background:"#fff",border:"1.5px solid #c8c5ba",borderRadius:10,padding:10}}>
        <input type="text" placeholder="Projektname" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addProject()} style={{border:"1.5px solid #e2e0d8",borderRadius:6,padding:"10px 12px",fontSize:15,background:"#f5f4f0",outline:"none"}}/>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{border:"1.5px solid #e2e0d8",borderRadius:6,padding:"10px",fontSize:14,background:"#f5f4f0",outline:"none"}}/>
        <button onClick={addProject} style={{background:"#1a1917",color:"white",border:"none",borderRadius:6,fontSize:15,fontWeight:600,cursor:"pointer"}}>+ Projekt</button>
      </div>

      {sorted.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#6b6860"}}><div style={{fontSize:40,marginBottom:8}}>📋</div>Noch keine Projekte.</div>}

      {sorted.map(p=>{
        const pr=getProgress(p);
        const {label,cls}=getStatus(p);
        const warn=getWarning(p);
        const totalItems=Object.values(p.checklist).flat().length;
        const doneItems=Object.values(p.checklist).flat().filter(i=>i.done).length;
        return(
          <div key={p.id} style={{background:"#fff",border:"1.5px solid #e2e0d8",borderRadius:10,marginBottom:12,overflow:"hidden"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 14px",cursor:"pointer"}} onClick={()=>toggleOpen(p.id)}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:16,fontWeight:700}}>{p.name}</div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                  <span style={{fontSize:14}}>📅</span>
                  <input type="date" value={p.date?p.date.slice(0,10):""} style={{border:"none",background:"transparent",fontFamily:"monospace",fontSize:13,color:"#6b6860",cursor:"pointer",outline:"none"}} onClick={e=>e.stopPropagation()} onChange={e=>updateDate(p.id,e.target.value)}/>
                </div>
              </div>
              <div className="card-right" style={{display:"flex",alignItems:"center",gap:8}}>
                {warn&&<span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:99,background:"#fee2e2",color:"#dc2626",fontFamily:"monospace",whiteSpace:"nowrap"}}>{warn}</span>}
                <span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:99,fontFamily:"monospace",whiteSpace:"nowrap",...STATUS_STYLES[cls]}}>{label}</span>
                <button onClick={e=>{e.stopPropagation();deleteProject(p.id);}} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:16,opacity:0.4,padding:"4px 6px"}}>✕</button>
                <span style={{fontSize:14,color:"#6b6860",display:"inline-block",transform:p.open?"rotate(180deg)":"rotate(0deg)"}}>▾</span>
              </div>
            </div>

            <div style={{padding:"0 14px 12px"}}>
              <div style={{height:7,background:"#e2e0d8",borderRadius:99,overflow:"hidden",marginBottom:5}}>
                <div style={{width:pr+"%",height:"100%",background:getColor(pr),borderRadius:99,transition:"width 0.4s ease"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#6b6860",fontFamily:"monospace"}}>
                <span>{pr}% abgeschlossen</span>
                <span>{doneItems} / {totalItems} Punkte</span>
              </div>
            </div>

            {p.open&&(
              <>
                <div style={{height:1,background:"#e2e0d8",margin:"0 14px"}}/>
                <div className="checklist-grid" style={{padding:"14px",display:"grid",gap:16}}>
                  {ORDER.map((section,idx)=>{
                    const prevDone=ORDER.slice(0,idx).every(s=>p.checklist[s].every(x=>x.done));
                    const locked=idx>0&&!prevDone;
                    return(
                      <div key={section}>
                        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,color:"#6b6860",marginBottom:10,fontFamily:"monospace"}}>{LABELS[section]}</div>
                        {p.checklist[section].map((item,i)=>(
                          <div key={i} onClick={locked?undefined:()=>toggleItem(p.id,section,i)} title={locked?"Vorherige Phase zuerst abschliessen":""} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",fontSize:14,color:item.done?"#6b6860":locked?"#aaa":"#1a1917",textDecoration:item.done?"line-through":"none",cursor:locked?"not-allowed":"pointer",opacity:locked?0.45:1,borderBottom:"1px solid #f0efe9"}}>
                            <div style={{width:20,height:20,borderRadius:5,border:"1.5px solid "+(item.done?"#16a34a":locked?"#ddd":"#c8c5ba"),background:item.done?"#16a34a":locked?"#eee":"white",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"white",fontWeight:700}}>
                              {item.done?"✓":locked?"🔒":""}
                            </div>
                            <span>{item.name}</span>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
